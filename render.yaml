services:
  - type: web
    name: campusconnect-api
    env: node
    region: singapore
    buildCommand: npm install && npx prisma generate && npx prisma db push
    startCommand: node server/server.js
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: NODE_ENV
        value: production
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
